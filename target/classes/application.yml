spring:
  application:
    name: tumipay-transaction-orchestrator

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tumipay_orchestrator?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:tumipay}
    password: ${DB_PASSWORD:tumipay123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: TumiPayHikariPool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Redis (Idempotency) ───────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-http-form-post-size: 65536   # 64 KB — prevent oversized JSON bodies
    max-swallow-size: 65536
  error:
    include-message: never
    include-stacktrace: never
  shutdown: graceful

spring.lifecycle.timeout-per-shutdown-phase: 30s

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true

# ── OpenAPI ──────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha

# ── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      payment-provider:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2.0
        exponential-max-wait-duration: 10s
        retry-exceptions:
          - co.tumipay.orchestrator.domain.exception.PaymentProviderException
          - java.io.IOException
          - java.net.ConnectException
        ignore-exceptions:
          - co.tumipay.orchestrator.domain.exception.ValidationException
          - co.tumipay.orchestrator.domain.exception.DuplicateTransactionException

  circuit-breaker:
    instances:
      payment-provider:
        register-health-indicator: true
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 30s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  config: classpath:logback-spring.xml
  level:
    co.tumipay: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.springframework.web: WARN

# ── Application Custom Config ─────────────────────────────────────────────────
tumipay:
  orchestrator:
    # Security
    security:
      api-keys: ${API_KEYS:test-key-dev-001,test-key-dev-002}
      ip-whitelist: "{}"   # {"api-key": "prefix1,prefix2"} — empty = disabled
      public-paths: /actuator/health,/actuator/info,/api-docs,/api-docs/**,/swagger-ui/**,/swagger-ui.html

    # Transaction business limits
    transaction:
      max-amount-cents: ${MAX_AMOUNT_CENTS:10000000000}

    # Idempotency
    idempotency:
      ttl-hours: 24

    # Providers
    default-provider: MOCK
    providers:
      mock:
        enabled: true
